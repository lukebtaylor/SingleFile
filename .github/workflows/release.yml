name: Release

# Builds the extension and attaches the two artifacts build-extension.sh
# already produces (singlefile-extension-source.zip,
# singlefile-extension-firefox.zip) to a GitHub Release whenever
# manifest.json's version is bumped and pushed to master - the same
# version-bump-driven pattern single-file-companion-lite's release workflow
# uses (manifest.json here plays the role package.json plays there; see
# that project's release.yml). manifest.json was chosen over package.json
# because it's the version Chrome/Firefox actually enforce and read, and
# it's the one that gets bumped via a dedicated commit before every real
# publish - package.json's version drifts independently of that.
#
# Also runnable on demand via the Actions tab's "Run workflow" button
# (workflow_dispatch) - it reads whatever manifest.json's version currently
# is on the branch it runs against, same as a push trigger would.
#
# This does NOT submit to any browser store - Chrome Web Store /
# addons.mozilla.org both require a human to walk through their own review
# flow, and doing that from CI would mean storing store-publishing
# credentials as repo secrets, which nothing here currently has. This
# automates the "build the zips" half of a release; uploading to the stores
# stays a manual step, same as it is today.

on:
  push:
    branches: [master]
    paths:
      - manifest.json
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - uses: actions/checkout@v7

      - name: Read version from manifest.json
        id: version
        run: echo "tag=v$(jq -r .version manifest.json)" >> "$GITHUB_OUTPUT"

      - name: Check whether this version is already released
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ steps.version.outputs.tag }}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Already released - nothing to do."
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: check
    if: needs.check.outputs.exists == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - name: Build
        run: ./build-extension.sh
      - name: Attach zips to the GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.check.outputs.tag }}
          target_commitish: ${{ github.sha }}
          files: |
            singlefile-extension-source.zip
            singlefile-extension-firefox.zip
          generate_release_notes: true
